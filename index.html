<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KevTech - Portail de Veille IT</title>
    <!-- Intégration de Tailwind CSS via CDN pour un design moderne et rapide -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configuration de Tailwind pour notre thème personnalisé
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0b1220',
                        darker: '#020617',
                        card: '#1e293b',
                        primary: '#38bdf8'
                    }
                }
            }
        }
    </script>
    <!-- Intégration des icônes Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Quelques styles personnalisés pour la barre de défilement et les transitions */
        body { font-family: 'Inter', system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 300ms; }
        
        /* Animation de chargement */
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        .shimmer {
            animation: shimmer 2s infinite;
            background: linear-gradient(90deg, #1e293b 0%, #334155 50%, #1e293b 100%);
            background-size: 1000px 100%;
        }
        
        /* Style pour les images qui ne chargent pas */
        img.image-fallback {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        /* Tooltip personnalisé */
        [data-tooltip] {
            position: relative;
            cursor: pointer;
        }
        [data-tooltip]:before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 4px 8px;
            background: #1e293b;
            color: white;
            font-size: 12px;
            border-radius: 4px;
            white-space: nowrap;
            display: none;
            z-index: 10;
        }
        [data-tooltip]:hover:before {
            display: block;
        }
    </style>
</head>
<body class="bg-dark text-gray-200 flex h-screen overflow-hidden">

    <!-- Sidebar (Menu latéral) -->
    <aside id="sidebar" class="bg-darker w-64 border-r border-gray-800 flex-shrink-0 absolute md:relative z-20 h-full transform -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col">
        <div class="p-6 flex items-center justify-between border-b border-gray-800">
            <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                <i data-lucide="cpu" class="text-primary"></i> KevTech
            </h1>
            <button onclick="toggleMenu()" class="md:hidden text-gray-400 hover:text-white">
                <i data-lucide="x"></i>
            </button>
        </div>
        
        <nav class="p-4 space-y-2 flex-1 overflow-y-auto" id="menu-container">
            <!-- Les éléments du menu seront générés ici par JavaScript -->
        </nav>

        <div class="w-full p-4 border-t border-gray-800 text-xs text-gray-500 text-center mt-auto">
            <div class="flex flex-col gap-1">
                <span>🔄 Veille auto-actualisée</span>
                <span id="last-update" class="text-gray-600">Dernière mise à jour: --:--</span>
            </div>
        </div>
    </aside>

    <div id="sidebar-overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/50 z-10 hidden md:hidden"></div>

    <!-- Contenu Principal -->
    <main class="flex-1 flex flex-col h-full relative">
        <header class="bg-darker/80 backdrop-blur-md border-b border-gray-800 p-4 sticky top-0 z-10">
            <div class="flex items-center justify-between max-w-7xl mx-auto gap-4">
                <div class="flex items-center gap-4 flex-1">
                    <button onclick="toggleMenu()" class="md:hidden text-gray-300 hover:text-white focus:outline-none">
                        <i data-lucide="menu"></i>
                    </button>
                    
                    <div class="relative flex-1 max-w-md">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="search" class="text-gray-500 w-4 h-4"></i>
                        </div>
                        <input type="text" id="search" onkeyup="filterArticles()" placeholder="Rechercher un article (titre, description)..." 
                            class="block w-full pl-10 pr-3 py-2 border border-gray-700 rounded-lg leading-5 bg-gray-900 text-gray-300 placeholder-gray-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary sm:text-sm transition-colors">
                    </div>
                </div>

                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-2" data-tooltip="Statut de la connexion">
                        <span id="status-indicator" class="flex h-3 w-3 relative">
                            <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                        </span>
                    </div>
                    <button onclick="loadCurrentCategory()" class="p-2 bg-gray-800 hover:bg-gray-700 rounded-lg transition-colors text-gray-300" title="Rafraîchir">
                        <i data-lucide="refresh-cw" class="w-4 h-4" id="refresh-icon"></i>
                    </button>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-6" id="main-scroll">
            <div class="max-w-7xl mx-auto">
                
                <div class="flex items-center justify-between mb-6 flex-wrap gap-4">
                    <h2 id="category-title" class="text-xl md:text-2xl font-semibold text-white capitalize flex items-center gap-2">
                        <i data-lucide="activity" class="text-primary"></i> À la une
                    </h2>
                    <div class="flex items-center gap-4">
                        <span id="article-count" class="text-sm text-gray-400">0 articles</span>
                        <button id="sort-btn" onclick="toggleSort()" class="text-xs bg-gray-800 px-3 py-1 rounded-lg hover:bg-gray-700 transition-colors flex items-center gap-1">
                            <i data-lucide="arrow-up-down" class="w-3 h-3"></i>
                            <span>Date</span>
                        </button>
                    </div>
                </div>

                <div id="feed" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                    <!-- Les cartes seront injectées ici -->
                </div>

                <div id="loader" class="hidden grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                    <!-- Squelettes générés en JS -->
                </div>
                
                <div id="empty-state" class="hidden flex-col items-center justify-center py-20 text-gray-500">
                    <i data-lucide="inbox" class="w-16 h-16 mb-4 opacity-50"></i>
                    <p class="text-lg">Aucun article trouvé.</p>
                    <p class="text-sm mt-2">Essayez de modifier votre recherche ou rafraîchissez la page.</p>
                </div>

                <!-- Bouton retour en haut -->
                <button id="scroll-top" onclick="scrollToTop()" class="fixed bottom-6 right-6 bg-primary/20 hover:bg-primary/30 backdrop-blur-md p-3 rounded-full transition-all hidden">
                    <i data-lucide="arrow-up" class="w-5 h-5 text-primary"></i>
                </button>

            </div>
        </div>
    </main>

    <script>
        // --------------------------------------------------------
        // 1. CONFIGURATION DES DONNÉES AVEC PLUS DE FLUX RSS FIABLES
        // --------------------------------------------------------
        const categories = {
            it: { icon: 'monitor', label: 'Tech & IT', feeds: [
                "https://www.clubic.com/feed",
                "https://www.01net.com/actualites/feed/",
                "https://www.lesnumeriques.com/rss/news.xml"
            ]},
            windows: { icon: 'layout-grid', label: 'Windows', feeds: [
                "https://www.clubic.com/os/windows/feed",
                "https://www.lesnumeriques.com/rss/news.xml"
            ]},
            android: { icon: 'smartphone', label: 'Android', feeds: [
                "https://www.clubic.com/telecom/telephonie-android/feed",
                "https://www.frandroid.com/feed"
            ]},
            iphone: { icon: 'apple', label: 'Apple / iPhone', feeds: [
                "https://www.clubic.com/telecom/telephonie-ios/feed",
                "https://www.frandroid.com/marques/apple/feed"
            ]},
            cyber: { icon: 'shield-alert', label: 'Cybersécurité', feeds: [
                "https://www.clubic.com/securite-informatique/feed",
                "https://www.lemondeinformatique.fr/flux-rss/thematique/securite/rss.xml"
            ]}
        };

        let currentCategoryKey = 'it';
        let allCurrentArticles = [];
        let sortDescending = true; // Tri par date décroissant par défaut
        let currentSearchQuery = '';

        // --------------------------------------------------------
        // 2. INITIALISATION DE L'INTERFACE
        // --------------------------------------------------------
        function initApp() {
            lucide.createIcons();
            buildMenu();
            changeCategory('it');
            
            // Mise à jour automatique toutes les 6 heures (au lieu de 24h)
            setInterval(loadCurrentCategory, 21600000);
            
            // Détection du scroll pour afficher/masquer le bouton retour en haut
            const mainScroll = document.getElementById('main-scroll');
            mainScroll.addEventListener('scroll', () => {
                const scrollTopBtn = document.getElementById('scroll-top');
                if (mainScroll.scrollTop > 300) {
                    scrollTopBtn.classList.remove('hidden');
                } else {
                    scrollTopBtn.classList.add('hidden');
                }
            });
        }

        function buildMenu() {
            const menuContainer = document.getElementById('menu-container');
            menuContainer.innerHTML = '';

            for (const [key, data] of Object.entries(categories)) {
                const btn = document.createElement('button');
                btn.className = `w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-colors menu-item ${key === currentCategoryKey ? 'bg-gray-800 text-white border-l-4 border-primary' : 'text-gray-400 hover:bg-gray-800/50 hover:text-gray-200'}`;
                btn.dataset.key = key;
                btn.onclick = () => { changeCategory(key); toggleMenu(true); };
                
                btn.innerHTML = `
                    <i data-lucide="${data.icon}" class="w-5 h-5"></i>
                    <span class="font-medium">${data.label}</span>
                `;
                menuContainer.appendChild(btn);
            }
            lucide.createIcons({ root: menuContainer });
        }

        function toggleMenu(forceClose = false) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            if (forceClose || !sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            } else {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            }
        }

        function scrollToTop() {
            document.getElementById('main-scroll').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleSort() {
            sortDescending = !sortDescending;
            const sortBtn = document.getElementById('sort-btn');
            const icon = sortBtn.querySelector('i');
            if (icon) icon.setAttribute('data-lucide', sortDescending ? 'arrow-down' : 'arrow-up');
            lucide.createIcons();
            
            sortArticles();
            
            if (currentSearchQuery) {
                filterArticles();
            } else {
                renderArticles(allCurrentArticles);
            }
        }

        function sortArticles() {
            allCurrentArticles.sort((a, b) => {
                const dateA = new Date(a.pubDate);
                const dateB = new Date(b.pubDate);
                return sortDescending ? dateB - dateA : dateA - dateB;
            });
        }

        // --------------------------------------------------------
        // 3. LOGIQUE MÉTIER (RÉCUPÉRATION DES DONNÉES)
        // --------------------------------------------------------
        function changeCategory(key) {
            currentCategoryKey = key;
            
            document.querySelectorAll('.menu-item').forEach(el => {
                if (el.dataset.key === key) {
                    el.className = 'w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-colors menu-item bg-gray-800 text-white border-l-4 border-primary';
                } else {
                    el.className = 'w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-colors menu-item text-gray-400 hover:bg-gray-800/50 hover:text-gray-200 border-l-4 border-transparent';
                }
            });

            const catData = categories[key];
            document.getElementById('category-title').innerHTML = `<i data-lucide="${catData.icon}" class="text-primary w-6 h-6"></i> ${catData.label}`;
            lucide.createIcons();
            
            document.getElementById('search').value = '';
            currentSearchQuery = '';
            document.getElementById('main-scroll').scrollTo(0,0);

            loadCurrentCategory();
        }

        async function loadCurrentCategory() {
            const feedContainer = document.getElementById("feed");
            const emptyState = document.getElementById("empty-state");
            const refreshIcon = document.getElementById("refresh-icon");
            const statusDot = document.querySelector("#status-indicator .relative");

            feedContainer.innerHTML = "";
            emptyState.classList.add("hidden");
            refreshIcon.classList.add("animate-spin");
            statusDot.className = "relative inline-flex rounded-full h-3 w-3 bg-yellow-500";
            showLoader();

            const urls = categories[currentCategoryKey].feeds;
            allCurrentArticles = [];
            
            let successCount = 0;
            let errorCount = 0;

            try {
                // Utilisation de plusieurs services proxy pour éviter les blocages
                for (const url of urls) {
                    try {
                        // Essayer avec rss2json d'abord
                        let data = await fetchWithProxy(url, 'rss2json');
                        
                        if (!data || data.status !== "ok") {
                            // Fallback avec api.allorigins
                            data = await fetchWithProxy(url, 'allorigins');
                        }
                        
                        if (data && data.items && data.items.length > 0) {
                            const feedLink = (data.feed && data.feed.link) ? data.feed.link : url;
                            const sourceName = extractHostname(feedLink);
                            
                            const itemsWithSource = data.items.map(item => ({
                                ...item,
                                sourceName,
                                // Nettoyage du contenu
                                description: cleanDescription(item.description || item.content || ''),
                                title: stripHtml(item.title || 'Sans titre')
                            }));
                            allCurrentArticles = allCurrentArticles.concat(itemsWithSource);
                            successCount++;
                        } else {
                            errorCount++;
                        }
                    } catch (feedError) {
                        console.warn(`Impossible de charger le flux: ${url}`, feedError);
                        errorCount++;
                    }
                }

                // Tri chronologique
                sortArticles();

                renderArticles(allCurrentArticles);
                
                // Mise à jour du statut
                if (successCount > 0) {
                    statusDot.className = "relative inline-flex rounded-full h-3 w-3 bg-green-500";
                    document.getElementById('status-indicator').title = `Synchronisé à ${new Date().toLocaleTimeString()} (${successCount}/${successCount + errorCount} flux OK)`;
                } else {
                    statusDot.className = "relative inline-flex rounded-full h-3 w-3 bg-red-500";
                    document.getElementById('status-indicator').title = "Erreur de connexion - Aucun flux chargé";
                }
                
                // Mise à jour de l'heure de dernière mise à jour
                const now = new Date();
                document.getElementById('last-update').textContent = `Dernière mise à jour: ${now.toLocaleTimeString()}`;

            } catch (err) {
                console.error("Erreur générale :", err);
                statusDot.className = "relative inline-flex rounded-full h-3 w-3 bg-red-500";
                document.getElementById('status-indicator').title = "Erreur de connexion";
            } finally {
                hideLoader();
                refreshIcon.classList.remove("animate-spin");
                document.getElementById("article-count").textContent = `${allCurrentArticles.length} articles (${successCount} sources chargées)`;
                
                if(allCurrentArticles.length === 0) {
                    emptyState.classList.remove("hidden");
                    emptyState.innerHTML = `
                        <i data-lucide="alert-triangle" class="w-16 h-16 mb-4 text-red-500"></i>
                        <p class="text-lg">Aucun article n'a pu être chargé.</p>
                        <p class="text-sm mt-2">Vérifiez votre connexion internet ou réessayez plus tard.</p>
                        <button onclick="loadCurrentCategory()" class="mt-4 px-4 py-2 bg-primary/20 hover:bg-primary/30 rounded-lg transition-colors">
                            <i data-lucide="refresh-cw" class="w-4 h-4 inline mr-2"></i>Réessayer
                        </button>
                    `;
                    lucide.createIcons();
                }
            }
        }

        async function fetchWithProxy(url, proxyType) {
            let proxyUrl;
            if (proxyType === 'rss2json') {
                proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`;
            } else {
                // Utiliser allorigins comme fallback
                proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            }
            
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            let data;
            if (proxyType === 'rss2json') {
                data = await response.json();
            } else {
                const rawData = await response.json();
                if (rawData && rawData.contents) {
                    // Parser le XML manuellement
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(rawData.contents, "text/xml");
                    data = parseRSSXML(xmlDoc);
                } else {
                    throw new Error('Invalid response');
                }
            }
            
            return data;
        }

        function parseRSSXML(xmlDoc) {
            const items = xmlDoc.querySelectorAll('item');
            const feedItems = [];
            
            items.forEach(item => {
                const title = item.querySelector('title')?.textContent || '';
                const link = item.querySelector('link')?.textContent || '';
                const description = item.querySelector('description')?.textContent || '';
                const pubDate = item.querySelector('pubDate')?.textContent || '';
                const enclosure = item.querySelector('enclosure');
                let thumbnail = null;
                
                if (enclosure && enclosure.getAttribute('url')) {
                    thumbnail = enclosure.getAttribute('url');
                }
                
                feedItems.push({
                    title,
                    link,
                    description,
                    pubDate,
                    thumbnail,
                    content: description
                });
            });
            
            return {
                status: 'ok',
                items: feedItems,
                feed: { link: '' }
            };
        }

        // --------------------------------------------------------
        // 4. RENDU VISUEL ET UTILITAIRES
        // --------------------------------------------------------
        
        function renderArticles(articles) {
            const feedContainer = document.getElementById("feed");
            const emptyState = document.getElementById("empty-state");
            feedContainer.innerHTML = "";

            if (articles.length === 0) {
                emptyState.classList.remove("hidden");
                return;
            }

            emptyState.classList.add("hidden");

            articles.forEach(item => {
                const cleanDescription = item.description || "Aucune description disponible";
                const safeTitle = item.title || "Sans titre";
                
                let formattedDate = "Date inconnue";
                const dateObj = new Date(item.pubDate);
                if (!isNaN(dateObj.getTime())) {
                    formattedDate = dateObj.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' });
                }

                // Extraction d'image améliorée
                let imageUrl = extractImageFromItem(item);
                
                if (!imageUrl || imageUrl === 'null' || imageUrl === 'undefined') {
                    imageUrl = getCategoryImage(currentCategoryKey);
                }

                const cardHTML = `
                    <a href="${item.link || '#'}" target="_blank" rel="noopener noreferrer" class="group flex flex-col bg-card border border-gray-800 rounded-xl overflow-hidden hover:border-primary/50 transition-all hover:shadow-lg hover:shadow-primary/5 hover:-translate-y-1 h-full">
                        <div class="h-48 w-full bg-gradient-to-br from-gray-800 to-gray-900 relative overflow-hidden flex-shrink-0">
                            <img src="${imageUrl}" alt="${escapeHtml(safeTitle)}" referrerpolicy="no-referrer" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500" 
                                 onerror="this.onerror=null; this.src='https://placehold.co/600x400/1e293b/38bdf8?text=${encodeURIComponent(safeTitle.substring(0, 30))}'">
                            <div class="absolute inset-0 bg-gradient-to-t from-card via-transparent to-transparent"></div>
                            <div class="absolute top-2 right-2">
                                <span class="px-2 py-1 bg-black/50 backdrop-blur-sm rounded text-xs text-primary">
                                    ${escapeHtml(item.sourceName || 'Source')}
                                </span>
                            </div>
                        </div>
                        <div class="p-5 flex-1 flex flex-col">
                            <div class="flex items-center justify-between text-xs text-primary font-medium mb-3">
                                <span class="flex items-center gap-1"><i data-lucide="globe" class="w-3 h-3"></i> ${escapeHtml(item.sourceName || 'Source')}</span>
                                <span class="text-gray-500 text-xs">${formattedDate}</span>
                            </div>
                            <h3 class="text-lg font-semibold text-white leading-tight mb-3 group-hover:text-primary transition-colors line-clamp-2">${escapeHtml(safeTitle)}</h3>
                            <p class="text-sm text-gray-400 line-clamp-3">${escapeHtml(cleanDescription)}</p>
                            <div class="mt-4 pt-3 border-t border-gray-800 flex items-center justify-between text-xs">
                                <span class="text-primary flex items-center gap-1">
                                    <i data-lucide="external-link" class="w-3 h-3"></i> Lire l'article
                                </span>
                                <span class="text-gray-600">📖 ${Math.floor(cleanDescription.length / 100) + 1} min de lecture</span>
                            </div>
                        </div>
                    </a>
                `;
                feedContainer.insertAdjacentHTML('beforeend', cardHTML);
            });
            lucide.createIcons();
        }

        function extractImageFromItem(item) {
            // Vérifier différentes sources d'image
            if (item.thumbnail && item.thumbnail.startsWith('http')) return item.thumbnail;
            if (item.enclosure && item.enclosure.link && item.enclosure.link.startsWith('http')) return item.enclosure.link;
            
            // Extraire des balises img dans le contenu
            const content = item.content || item.description || '';
            const imgMatch = content.match(/<img[^>]+src="([^">]+)"/);
            if (imgMatch && imgMatch[1].startsWith('http')) return imgMatch[1];
            
            // Vérifier dans les media:content
            if (item['media:content'] && item['media:content'].url) return item['media:content'].url;
            
            return null;
        }

        function getCategoryImage(categoryKey) {
            const images = {
                it: 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&q=80&w=400&h=200',
                windows: 'https://images.unsplash.com/photo-1574169208507-84376144848b?auto=format&fit=crop&q=80&w=400&h=200',
                android: 'https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?auto=format&fit=crop&q=80&w=400&h=200',
                iphone: 'https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?auto=format&fit=crop&q=80&w=400&h=200',
                cyber: 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=400&h=200'
            };
            return images[categoryKey] || 'https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?auto=format&fit=crop&q=80&w=400&h=200';
        }

        function filterArticles() {
            const query = document.getElementById("search").value.toLowerCase();
            currentSearchQuery = query;
            
            if (!query.trim()) {
                renderArticles(allCurrentArticles);
                document.getElementById("article-count").textContent = `${allCurrentArticles.length} articles`;
                return;
            }
            
            const filtered = allCurrentArticles.filter(item => 
                (item.title && item.title.toLowerCase().includes(query)) || 
                (item.description && item.description.toLowerCase().includes(query)) ||
                (item.sourceName && item.sourceName.toLowerCase().includes(query))
            );
            renderArticles(filtered);
            document.getElementById("article-count").textContent = `${filtered.length} résultats pour "${query}"`;
        }

        function cleanDescription(html) {
            if (!html) return "";
            let text = stripHtml(html);
            text = text.replace(/\s+/g, ' ').trim();
            if (text.length > 200) {
                text = text.substring(0, 200) + '...';
            }
            return text;
        }

        // --- Fonctions Utilitaires ---
        function extractHostname(url) {
            try { 
                const hostname = new URL(url).hostname.replace('www.', '');
                return hostname.split('.')[0].charAt(0).toUpperCase() + hostname.split('.')[0].slice(1);
            } catch { 
                return "Source IT";
            }
        }

        function stripHtml(html) {
            if(!html) return "";
            let tmp = document.createElement("DIV");
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || "";
        }
        
        function escapeHtml(text) {
            if (!text) return "";
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showLoader() {
            const loader = document.getElementById("loader");
            loader.innerHTML = '';
            loader.classList.remove("hidden");
            for(let i=0; i<6; i++) {
                loader.innerHTML += `
                    <div class="bg-card border border-gray-800 rounded-xl overflow-hidden">
                        <div class="h-48 shimmer"></div>
                        <div class="p-5 space-y-3">
                            <div class="h-3 bg-gray-800 rounded w-1/3 shimmer"></div>
                            <div class="h-5 bg-gray-700 rounded w-full shimmer"></div>
                            <div class="h-5 bg-gray-700 rounded w-5/6 shimmer"></div>
                            <div class="h-3 bg-gray-800 rounded w-full mt-4 shimmer"></div>
                            <div class="h-3 bg-gray-800 rounded w-2/3 shimmer"></div>
                        </div>
                    </div>
                `;
            }
        }

        function hideLoader() {
            document.getElementById("loader").classList.add("hidden");
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
