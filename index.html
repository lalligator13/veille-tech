<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KevTech - Veille Technologique Française</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0c10;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(59, 130, 246, 0.3); }
            50% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 25px 30px -12px rgba(59, 130, 246, 0.3);
            border-color: #3b82f6;
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec489a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .menu-item {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .menu-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.2), transparent);
            transition: width 0.3s ease;
        }
        
        .menu-item:hover::before {
            width: 100%;
        }
        
        img {
            opacity: 0;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        img.loaded {
            opacity: 1;
        }
        
        .skeleton {
            background: linear-gradient(90deg, #1f2937 0%, #374151 50%, #1f2937 100%);
            background-size: 200% 100%;
            animation: skeleton 1.5s infinite;
        }
        
        @keyframes skeleton {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .article-card {
            animation: slideIn 0.5s ease-out forwards;
            opacity: 0;
            cursor: pointer;
        }
        
        .refresh-rotate {
            transition: transform 0.5s ease;
        }
        .refresh-rotate:hover {
            transform: rotate(180deg);
        }
        
        .glow-effect {
            animation: glow 2s ease-in-out infinite;
        }
        
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        
        .article-view {
            animation: slideIn 0.5s ease-out forwards;
        }
        
        .article-content {
            max-width: 900px;
            margin: 0 auto;
            color: #ffffff !important;
        }
        
        .article-content * {
            color: #ffffff !important;
        }
        
        .article-content p {
            margin-bottom: 1.2rem;
            line-height: 1.7;
            font-size: 1rem;
            color: #ffffff !important;
        }
        
        .back-button {
            transition: all 0.3s ease;
        }
        
        .back-button:hover {
            transform: translateX(-4px);
        }
        
        /* Styles pour le quiz */
        .quiz-option {
            transition: all 0.3s ease;
        }
        .quiz-option:hover {
            transform: translateX(8px);
            background: rgba(59, 130, 246, 0.2);
        }
        .quiz-option.correct {
            background: rgba(34, 197, 94, 0.2);
            border-color: #22c55e;
        }
        .quiz-option.wrong {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
        }
        .score-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.2));
        }
    </style>
</head>
<body>

    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-72 bg-gray-900 border-r border-gray-800 flex-shrink-0 absolute md:relative z-20 h-full transform -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col">
            <div class="p-6 border-b border-gray-800">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center float-animation">
                        <i data-lucide="cpu" class="w-5 h-5 text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold gradient-text">KevTech</h1>
                        <p class="text-xs text-gray-500">Veille IT française</p>
                    </div>
                </div>
                <button onclick="toggleSidebar()" class="absolute top-6 right-4 md:hidden text-gray-400">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <nav class="flex-1 overflow-y-auto p-4 space-y-2" id="menuContainer"></nav>
            
            <div class="p-4 border-t border-gray-800 space-y-3">
                <div class="flex justify-between items-center text-xs">
                    <span class="text-gray-500">🔄 Rafraîchissement</span>
                    <span id="timer" class="text-blue-400 font-mono glow-effect">05:00</span>
                </div>
                <div class="h-1 bg-gray-800 rounded-full overflow-hidden">
                    <div id="timerProgress" class="h-full bg-gradient-to-r from-blue-500 to-purple-600 rounded-full transition-all duration-1000" style="width: 0%"></div>
                </div>
                <div class="text-center text-xs text-gray-600" id="lastUpdate">--:--:--</div>
            </div>
        </aside>
        
        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-10 hidden md:hidden"></div>
        
        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-full overflow-hidden">
            <header class="bg-gray-900/80 backdrop-blur-sm border-b border-gray-800 sticky top-0 z-10">
                <div class="max-w-7xl mx-auto px-4 py-3">
                    <div class="flex items-center gap-4">
                        <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white transition">
                            <i data-lucide="menu" class="w-5 h-5"></i>
                        </button>
                        
                        <div class="flex-1 relative max-w-md" id="searchContainer">
                            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 w-4 h-4"></i>
                            <input type="text" id="searchInput" placeholder="Rechercher un article..." 
                                class="w-full pl-10 pr-4 py-2 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all text-sm">
                        </div>
                        
                        <button onclick="refreshCurrentCategory()" class="p-2 bg-gray-800 hover:bg-gray-700 rounded-lg transition refresh-rotate">
                            <i data-lucide="refresh-cw" id="refreshIcon" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            </header>
            
            <div class="flex-1 overflow-y-auto p-4 md:p-6" id="contentArea">
                <div class="max-w-7xl mx-auto">
                    <!-- Vue liste des articles / quiz -->
                    <div id="listView">
                        <div class="flex justify-between items-center mb-6">
                            <div>
                                <h2 id="categoryTitle" class="text-2xl font-bold flex items-center gap-2">
                                    <i data-lucide="activity" class="text-blue-500 w-6 h-6 float-animation"></i>
                                    <span class="gradient-text">Tech - IT</span>
                                </h2>
                                <p class="text-gray-500 text-sm mt-1" id="categoryDescription">Actualités IT - IT-Connect</p>
                            </div>
                            <div class="bg-gray-800 px-3 py-1 rounded-lg">
                                <span id="articleCount" class="text-sm text-gray-400">0 articles</span>
                            </div>
                        </div>
                        
                        <div id="articlesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                        <div id="quizContainer" class="hidden"></div>
                        <div id="skeletonLoader" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden"></div>
                        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20">
                            <div class="w-20 h-20 bg-gray-800 rounded-full flex items-center justify-center mb-4 animate-pulse">
                                <i data-lucide="inbox" class="w-10 h-10 text-gray-600"></i>
                            </div>
                            <p class="text-gray-400 text-lg">Aucun article trouvé</p>
                            <button onclick="refreshCurrentCategory()" class="mt-4 px-4 py-2 bg-blue-500/20 hover:bg-blue-500/30 rounded-lg text-sm transition-all hover:scale-105">
                                🔄 Réessayer
                            </button>
                        </div>
                    </div>
                    
                    <!-- Vue article individuel -->
                    <div id="articleView" class="hidden">
                        <button onclick="backToList()" class="back-button mb-6 flex items-center gap-2 text-blue-400 hover:text-blue-300 transition-all bg-gray-800/50 px-4 py-2 rounded-lg">
                            <i data-lucide="arrow-left" class="w-5 h-5"></i>
                            <span>Retour</span>
                        </button>
                        <div id="articleContent" class="article-view bg-gray-900 rounded-2xl border border-gray-800 p-6 md:p-10">
                            <div id="articleBody"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ============================================
        // QUESTIONS DU QUIZ - Réseau et Hardware niveau TSSR
        // ============================================
        const QUIZ_QUESTIONS = [
            {
                id: 1,
                question: "Quelle est l'adresse IP de bouclage (loopback) ?",
                options: ["127.0.0.1", "0.0.0.0", "255.255.255.255", "192.168.1.1"],
                correct: 0,
                explanation: "127.0.0.1 est l'adresse de bouclage utilisée pour tester la pile TCP/IP locale."
            },
            {
                id: 2,
                question: "Que signifie l'acronyme DHCP ?",
                options: ["Dynamic Host Configuration Protocol", "Domain Host Control Protocol", "Data Handling Control Protocol", "Dynamic Hypertext Control Protocol"],
                correct: 0,
                explanation: "DHCP (Dynamic Host Configuration Protocol) permet d'attribuer automatiquement des adresses IP aux équipements réseau."
            },
            {
                id: 3,
                question: "Quel est le rôle d'un commutateur (switch) dans un réseau ?",
                options: [
                    "Connecter plusieurs réseaux différents",
                    "Distribuer une connexion Internet sans fil",
                    "Connecter plusieurs équipements sur un même réseau en utilisant les adresses MAC",
                    "Attribuer des adresses IP automatiquement"
                ],
                correct: 2,
                explanation: "Un switch connecte des équipements sur un même réseau en utilisant les adresses MAC pour acheminer les données."
            },
            {
                id: 4,
                question: "Quelle est la différence entre un disque SSD et un disque HDD ?",
                options: [
                    "Le SSD est plus lent que le HDD",
                    "Le SSD n'a pas de parties mobiles et est plus rapide",
                    "Le HDD est plus fiable que le SSD",
                    "Ils fonctionnent exactement de la même manière"
                ],
                correct: 1,
                explanation: "Le SSD utilise de la mémoire flash sans parties mobiles, ce qui le rend plus rapide et plus résistant aux chocs que le HDD."
            },
            {
                id: 5,
                question: "Que signifie l'acronyme DNS ?",
                options: ["Domain Name System", "Data Network Service", "Dynamic Name Server", "Digital Network System"],
                correct: 0,
                explanation: "Le DNS (Domain Name System) traduit les noms de domaine en adresses IP."
            },
            {
                id: 6,
                question: "Quel est le rôle de la RAM dans un ordinateur ?",
                options: [
                    "Stocker les données de manière permanente",
                    "Exécuter les calculs du processeur",
                    "Stocker temporairement les données en cours d'utilisation",
                    "Gérer les connexions réseau"
                ],
                correct: 2,
                explanation: "La RAM (Random Access Memory) stocke temporairement les données et programmes en cours d'utilisation pour un accès rapide."
            },
            {
                id: 7,
                question: "À quoi sert un routeur ?",
                options: [
                    "Connecter des équipements sur un même réseau",
                    "Relier différents réseaux entre eux et acheminer les données",
                    "Amplifier le signal Wi-Fi",
                    "Protéger le réseau contre les virus"
                ],
                correct: 1,
                explanation: "Un routeur relie différents réseaux (comme le réseau local et Internet) et achemine les paquets de données."
            },
            {
                id: 8,
                question: "Qu'est-ce que le BIOS/UEFI ?",
                options: [
                    "Un système d'exploitation",
                    "Un logiciel de bureau à distance",
                    "Un firmware qui initialise le matériel au démarrage",
                    "Un type de processeur"
                ],
                correct: 2,
                explanation: "Le BIOS/UEFI est le firmware qui initialise le matériel et lance le système d'exploitation au démarrage."
            },
            {
                id: 9,
                question: "Quel est le port par défaut du protocole HTTP ?",
                options: ["80", "443", "21", "22"],
                correct: 0,
                explanation: "Le port 80 est utilisé par défaut pour le trafic HTTP non sécurisé."
            },
            {
                id: 10,
                question: "Qu'est-ce qu'une adresse MAC ?",
                options: [
                    "Une adresse IP publique",
                    "Une adresse unique attribuée à chaque interface réseau",
                    "Un mot de passe Wi-Fi",
                    "Un type de câble réseau"
                ],
                correct: 1,
                explanation: "L'adresse MAC (Media Access Control) est une adresse unique attribuée à chaque carte réseau."
            }
        ];
        
        let quizState = {
            currentQuestionIndex: 0,
            score: 0,
            answers: [],
            quizCompleted: false
        };
        
        const CATEGORIES = {
            tech_it: {
                name: "Tech - IT",
                icon: "monitor",
                description: "Actualités IT - IT-Connect",
                feeds: ["https://www.it-connect.fr/feed/"],
                isQuiz: false
            },
            revision: {
                name: "Revision IT",
                icon: "graduation-cap",
                description: "Quiz réseau et hardware - Niveau TSSR",
                feeds: [],
                isQuiz: true
            },
            android: {
                name: "Android",
                icon: "smartphone",
                description: "Actualités Android",
                feeds: ["https://www.frandroid.com/feed", "https://www.phonandroid.com/feed"],
                isQuiz: false
            },
            apple: {
                name: "Apple",
                icon: "apple",
                description: "Actualités Apple",
                feeds: ["https://www.iphoneaddict.fr/feed", "https://www.mac4ever.com/feed"],
                isQuiz: false
            },
            linux: {
                name: "Linux",
                icon: "terminal",
                description: "Actualités Linux",
                feeds: ["https://linuxfr.org/news.atom", "https://www.it-connect.fr/category/linux/feed/", "https://www.nextinpact.com/linux/feed"],
                isQuiz: false
            },
            cyber: {
                name: "Cybersécurité",
                icon: "shield",
                description: "Actualités Cybersécurité",
                feeds: ["https://www.it-connect.fr/category/cybersecurite/feed/", "https://www.zataz.com/feed/"],
                isQuiz: false
            }
        };
        
        let currentCategory = "tech_it";
        let allArticles = [];
        let isLoading = false;
        let timerSeconds = 300;
        let timerInterval = null;
        
        const DEFAULT_IMAGES = {
            tech_it: "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=600&h=400&fit=crop",
            revision: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=600&h=400&fit=crop",
            android: "https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?w=600&h=400&fit=crop",
            apple: "https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?w=600&h=400&fit=crop",
            linux: "https://images.unsplash.com/photo-1629654291663-b91ad427698f?w=600&h=400&fit=crop",
            cyber: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=600&h=400&fit=crop"
        };
        
        function init() {
            lucide.createIcons();
            buildMenu();
            loadArticles();
            startTimer();
            document.getElementById("searchInput").addEventListener("input", filterArticles);
        }
        
        function buildMenu() {
            const container = document.getElementById("menuContainer");
            container.innerHTML = "";
            for (const [key, cat] of Object.entries(CATEGORIES)) {
                const isActive = key === currentCategory;
                const button = document.createElement("button");
                button.className = `menu-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all duration-300 ${isActive ? "bg-gradient-to-r from-blue-500/20 to-purple-500/20 text-blue-400 border-l-4 border-blue-500" : "text-gray-400 hover:bg-gray-800 hover:text-gray-200 hover:translate-x-1"}`;
                button.innerHTML = `<i data-lucide="${cat.icon}" class="w-5 h-5"></i><span class="flex-1 font-medium">${cat.name}</span>`;
                button.onclick = () => changeCategory(key);
                container.appendChild(button);
            }
            lucide.createIcons({ root: container });
        }
        
        function changeCategory(categoryKey) {
            if (isLoading || currentCategory === categoryKey) return;
            currentCategory = categoryKey;
            buildMenu();
            
            const cat = CATEGORIES[categoryKey];
            document.getElementById("categoryTitle").innerHTML = `<i data-lucide="${cat.icon}" class="text-blue-500 w-6 h-6 float-animation"></i><span class="gradient-text">${cat.name}</span>`;
            document.getElementById("categoryDescription").textContent = cat.description;
            lucide.createIcons();
            document.getElementById("searchInput").value = "";
            backToList();
            
            // Réinitialiser le quiz si on revient sur l'onglet revision
            if (cat.isQuiz) {
                resetQuiz();
                showQuizView();
            } else {
                hideQuizView();
                loadArticles();
            }
        }
        
        function resetQuiz() {
            quizState = {
                currentQuestionIndex: 0,
                score: 0,
                answers: [],
                quizCompleted: false
            };
        }
        
        function showQuizView() {
            document.getElementById("articlesGrid").classList.add("hidden");
            document.getElementById("skeletonLoader").classList.add("hidden");
            document.getElementById("emptyState").classList.add("hidden");
            document.getElementById("searchContainer").classList.add("hidden");
            document.getElementById("articleCount").parentElement.classList.add("hidden");
            
            const quizContainer = document.getElementById("quizContainer");
            quizContainer.classList.remove("hidden");
            renderQuiz();
        }
        
        function hideQuizView() {
            document.getElementById("articlesGrid").classList.remove("hidden");
            document.getElementById("searchContainer").classList.remove("hidden");
            document.getElementById("articleCount").parentElement.classList.remove("hidden");
            document.getElementById("quizContainer").classList.add("hidden");
        }
        
        function renderQuiz() {
            const quizContainer = document.getElementById("quizContainer");
            
            if (quizState.quizCompleted) {
                const scorePercent = (quizState.score / QUIZ_QUESTIONS.length) * 100;
                quizContainer.innerHTML = `
                    <div class="score-card rounded-2xl p-8 text-center border border-blue-500/30">
                        <i data-lucide="trophy" class="w-16 h-16 text-yellow-500 mx-auto mb-4"></i>
                        <h2 class="text-2xl font-bold text-white mb-2">Quiz terminé !</h2>
                        <p class="text-3xl font-bold text-blue-400 mb-4">${quizState.score} / ${QUIZ_QUESTIONS.length}</p>
                        <p class="text-gray-300 mb-6">Score : ${scorePercent}%</p>
                        <button onclick="resetQuizAndRestart()" class="px-6 py-3 bg-blue-500/20 hover:bg-blue-500/30 rounded-lg text-blue-400 transition-all">
                            <i data-lucide="rotate-ccw" class="w-4 h-4 inline mr-2"></i>
                            Recommencer le quiz
                        </button>
                    </div>
                `;
                lucide.createIcons({ root: quizContainer });
                return;
            }
            
            const question = QUIZ_QUESTIONS[quizState.currentQuestionIndex];
            const currentAnswer = quizState.answers[quizState.currentQuestionIndex];
            
            quizContainer.innerHTML = `
                <div class="bg-gray-900 rounded-2xl border border-gray-800 p-6 md:p-8">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-sm text-gray-400">Question ${quizState.currentQuestionIndex + 1}/${QUIZ_QUESTIONS.length}</span>
                        <span class="text-sm text-blue-400">Score: ${quizState.score}</span>
                    </div>
                    <div class="w-full bg-gray-800 rounded-full h-2 mb-8">
                        <div class="bg-gradient-to-r from-blue-500 to-purple-600 h-2 rounded-full transition-all duration-300" style="width: ${((quizState.currentQuestionIndex + 1) / QUIZ_QUESTIONS.length) * 100}%"></div>
                    </div>
                    <h3 class="text-xl md:text-2xl font-semibold text-white mb-6">${escapeHtml(question.question)}</h3>
                    <div class="space-y-3">
                        ${question.options.map((option, idx) => {
                            let additionalClass = "";
                            if (currentAnswer !== undefined) {
                                if (idx === question.correct) additionalClass = "correct border-green-500";
                                else if (idx === currentAnswer && idx !== question.correct) additionalClass = "wrong border-red-500";
                            }
                            return `
                                <div onclick="selectAnswer(${idx})" class="quiz-option p-4 rounded-lg border border-gray-700 cursor-pointer transition-all ${additionalClass} ${currentAnswer !== undefined ? 'pointer-events-none' : ''}">
                                    <span class="text-gray-200">${String.fromCharCode(65 + idx)}. ${escapeHtml(option)}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    ${currentAnswer !== undefined ? `
                        <div class="mt-6 p-4 bg-blue-500/10 rounded-lg border border-blue-500/30">
                            <p class="text-blue-400 font-semibold mb-1">📖 Explication :</p>
                            <p class="text-gray-300">${escapeHtml(question.explanation)}</p>
                        </div>
                        <button onclick="nextQuestion()" class="mt-6 px-6 py-3 bg-blue-500 hover:bg-blue-600 rounded-lg text-white transition-all w-full">
                            ${quizState.currentQuestionIndex === QUIZ_QUESTIONS.length - 1 ? 'Voir les résultats' : 'Question suivante'}
                        </button>
                    ` : ''}
                </div>
            `;
            lucide.createIcons({ root: quizContainer });
        }
        
        function selectAnswer(selectedIndex) {
            if (quizState.answers[quizState.currentQuestionIndex] !== undefined) return;
            
            const question = QUIZ_QUESTIONS[quizState.currentQuestionIndex];
            const isCorrect = selectedIndex === question.correct;
            
            quizState.answers[quizState.currentQuestionIndex] = selectedIndex;
            if (isCorrect) {
                quizState.score++;
            }
            
            renderQuiz();
        }
        
        function nextQuestion() {
            if (quizState.currentQuestionIndex + 1 < QUIZ_QUESTIONS.length) {
                quizState.currentQuestionIndex++;
                renderQuiz();
            } else {
                quizState.quizCompleted = true;
                renderQuiz();
            }
        }
        
        function resetQuizAndRestart() {
            resetQuiz();
            renderQuiz();
        }
        
        function backToList() {
            document.getElementById("listView").classList.remove("hidden");
            document.getElementById("articleView").classList.add("hidden");
            document.getElementById("searchInput").disabled = false;
            document.getElementById("searchInput").placeholder = "Rechercher un article...";
            
            const cat = CATEGORIES[currentCategory];
            if (cat.isQuiz) {
                showQuizView();
            }
        }
        
        function showArticle(article) {
            document.getElementById("listView").classList.add("hidden");
            document.getElementById("articleView").classList.remove("hidden");
            document.getElementById("searchInput").disabled = true;
            document.getElementById("searchInput").placeholder = "Lecture en cours...";
            
            const articleBody = document.getElementById("articleBody");
            articleBody.innerHTML = `
                <div class="flex flex-col items-center justify-center py-20">
                    <div class="w-12 h-12 border-4 border-blue-500/30 border-t-blue-500 rounded-full animate-spin mb-4"></div>
                    <p class="text-gray-400">Chargement de l'article...</p>
                </div>
            `;
            
            setTimeout(() => {
                const date = formatDate(article.pubDate);
                const content = article.description || "Contenu non disponible";
                
                articleBody.innerHTML = `
                    <div class="mb-6 pb-6 border-b border-gray-800">
                        <h1 class="text-3xl md:text-4xl font-bold text-white mb-4">${escapeHtml(article.title)}</h1>
                        <div class="flex items-center gap-4 text-sm text-gray-300">
                            <span class="flex items-center gap-1"><i data-lucide="globe" class="w-4 h-4"></i>${escapeHtml(article.sourceName)}</span>
                            <span class="flex items-center gap-1"><i data-lucide="calendar" class="w-4 h-4"></i>${date}</span>
                        </div>
                    </div>
                    <div class="article-content text-white">
                        ${content}
                    </div>
                    <div class="mt-8 pt-6 border-t border-gray-800 text-center">
                        <a href="${article.link}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 px-5 py-2.5 bg-blue-500/20 hover:bg-blue-500/30 rounded-lg text-blue-400 transition-all hover:gap-3">
                            <i data-lucide="external-link" class="w-4 h-4"></i>
                            Lire l'article original sur ${escapeHtml(article.sourceName)}
                        </a>
                    </div>
                `;
                lucide.createIcons({ root: articleBody });
            }, 500);
        }
        
        // Les fonctions loadArticles, fetchFeed, renderArticles, etc. restent identiques
        async function loadArticles() {
            if (isLoading) return;
            isLoading = true;
            
            const grid = document.getElementById("articlesGrid");
            const emptyState = document.getElementById("emptyState");
            const refreshIcon = document.getElementById("refreshIcon");
            
            grid.innerHTML = "";
            emptyState.classList.add("hidden");
            refreshIcon.classList.add("animate-spin");
            showSkeletons(true);
            
            const feeds = CATEGORIES[currentCategory].feeds;
            const allFetchedArticles = [];
            
            for (const feedUrl of feeds) {
                const articles = await fetchFeed(feedUrl);
                if (articles && articles.length > 0) {
                    allFetchedArticles.push(...articles);
                }
            }
            
            allFetchedArticles.sort((a, b) => {
                const dateA = a.pubDate ? new Date(a.pubDate) : new Date(0);
                const dateB = b.pubDate ? new Date(b.pubDate) : new Date(0);
                return dateB - dateA;
            });
            
            allArticles = allFetchedArticles;
            document.getElementById("articleCount").textContent = `${allArticles.length} articles`;
            document.getElementById("lastUpdate").textContent = new Date().toLocaleTimeString();
            
            if (allArticles.length === 0) {
                emptyState.classList.remove("hidden");
            } else {
                renderArticles(allArticles);
            }
            
            showSkeletons(false);
            refreshIcon.classList.remove("animate-spin");
            isLoading = false;
        }
        
        async function fetchFeed(url) {
            try {
                const proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                if (data && data.status === "ok" && data.items && data.items.length > 0) {
                    const sourceName = getSourceName(url);
                    return data.items.map(item => {
                        let imageUrl = null;
                        if (item.thumbnail && item.thumbnail.startsWith("http")) imageUrl = item.thumbnail;
                        if (!imageUrl && item.enclosure && item.enclosure.link) imageUrl = item.enclosure.link;
                        if (!imageUrl) {
                            const content = item.description || item.content || "";
                            const imgMatch = content.match(/<img[^>]+src=["']([^"']+)["']/i);
                            if (imgMatch && imgMatch[1]) imageUrl = imgMatch[1];
                        }
                        return {
                            title: cleanText(item.title),
                            link: item.link,
                            description: cleanText(item.description || item.content || ""),
                            pubDate: item.pubDate,
                            imageUrl: imageUrl,
                            sourceName: sourceName
                        };
                    });
                }
                return [];
            } catch (error) {
                console.error(`Erreur chargement ${url}:`, error);
                return [];
            }
        }
        
        function getSourceName(url) {
            if (url.includes("it-connect")) return "IT-Connect";
            if (url.includes("frandroid")) return "Frandroid";
            if (url.includes("phonandroid")) return "PhonAndroid";
            if (url.includes("iphoneaddict")) return "iPhoneAddict";
            if (url.includes("mac4ever")) return "Mac4Ever";
            if (url.includes("linuxfr")) return "LinuxFr";
            if (url.includes("nextinpact")) return "Next INpact";
            if (url.includes("zataz")) return "Zataz";
            return "Source";
        }
        
        function cleanText(text) {
            if (!text) return "";
            let cleaned = text.replace(/<[^>]*>/g, "");
            cleaned = cleaned.replace(/&nbsp;/g, " ").replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"');
            cleaned = cleaned.replace(/&eacute;/g, "é").replace(/&egrave;/g, "è").replace(/&ecirc;/g, "ê").replace(/&agrave;/g, "à").replace(/&acirc;/g, "â").replace(/&ccedil;/g, "ç");
            cleaned = cleaned.replace(/&rsquo;/g, "'").replace(/&lsquo;/g, "'").replace(/&ldquo;/g, '"').replace(/&rdquo;/g, '"');
            return cleaned.trim();
        }
        
        function renderArticles(articles) {
            const grid = document.getElementById("articlesGrid");
            grid.innerHTML = "";
            const defaultImage = DEFAULT_IMAGES[currentCategory] || DEFAULT_IMAGES.tech_it;
            
            articles.forEach((article, index) => {
                const date = formatDate(article.pubDate);
                const imageUrl = article.imageUrl && article.imageUrl.startsWith("http") ? article.imageUrl : defaultImage;
                const description = article.description || "Cliquez pour lire l'article complet";
                const title = article.title || "Article sans titre";
                
                const card = document.createElement("div");
                card.className = "article-card block bg-gray-900 rounded-xl overflow-hidden border border-gray-800 card-hover";
                card.style.animationDelay = `${index * 0.05}s`;
                card.onclick = () => showArticle(article);
                card.innerHTML = `
                    <div class="relative h-48 overflow-hidden bg-gray-800">
                        <img src="${imageUrl}" alt="${escapeHtml(title)}" class="w-full h-full object-cover transition-all duration-500 group-hover:scale-110" loading="lazy" onload="this.classList.add('loaded')" onerror="this.src='${defaultImage}'; this.classList.add('loaded')">
                        <div class="absolute inset-0 bg-gradient-to-t from-gray-900 via-transparent to-transparent"></div>
                        <div class="absolute top-3 left-3"><span class="px-2 py-1 bg-black/60 backdrop-blur-sm rounded-lg text-xs font-medium text-blue-400">${escapeHtml(article.sourceName)}</span></div>
                    </div>
                    <div class="p-5">
                        <div class="flex items-center gap-2 text-xs text-gray-500 mb-3"><i data-lucide="calendar" class="w-3 h-3"></i><span>${date}</span></div>
                        <h3 class="text-lg font-semibold text-white mb-2 line-clamp-2 hover:text-blue-400 transition-colors duration-300">${escapeHtml(title)}</h3>
                        <p class="text-sm text-gray-400 line-clamp-3">${escapeHtml(description.substring(0, 120))}${description.length > 120 ? "..." : ""}</p>
                        <div class="mt-4 pt-3 border-t border-gray-800 flex justify-between items-center">
                            <span class="text-xs text-gray-500">📖 ${Math.max(1, Math.ceil(description.length / 500))} min</span>
                            <span class="text-blue-400 text-sm flex items-center gap-1">Lire l'article <i data-lucide="arrow-right" class="w-4 h-4"></i></span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons({ root: grid });
        }
        
        function formatDate(dateString) {
            if (!dateString) return "Date inconnue";
            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return "Date inconnue";
                return date.toLocaleDateString("fr-FR", { day: "numeric", month: "long", hour: "2-digit", minute: "2-digit" });
            } catch { return "Date inconnue"; }
        }
        
        function filterArticles() {
            const query = document.getElementById("searchInput").value.toLowerCase().trim();
            if (!query) {
                document.getElementById("articleCount").textContent = `${allArticles.length} articles`;
                renderArticles(allArticles);
                return;
            }
            const filtered = allArticles.filter(article => article.title.toLowerCase().includes(query) || article.description.toLowerCase().includes(query));
            document.getElementById("articleCount").textContent = `${filtered.length} résultats`;
            renderArticles(filtered);
        }
        
        function refreshCurrentCategory() { if (isLoading) return; timerSeconds = 0; loadArticles(); }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (timerSeconds <= 0) { timerSeconds = 300; if (!isLoading && document.getElementById("listView").classList.contains("hidden") === false) loadArticles(); }
                else { timerSeconds--; const minutes = Math.floor(timerSeconds / 60); const seconds = timerSeconds % 60; document.getElementById("timer").textContent = `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`; document.getElementById("timerProgress").style.width = `${((300 - timerSeconds) / 300) * 100}%`; }
            }, 1000);
        }
        
        function showSkeletons(show) {
            const skeletonContainer = document.getElementById("skeletonLoader");
            const grid = document.getElementById("articlesGrid");
            if (show) {
                skeletonContainer.innerHTML = ""; skeletonContainer.classList.remove("hidden"); grid.classList.add("hidden");
                for (let i = 0; i < 6; i++) skeletonContainer.innerHTML += `<div class="bg-gray-900 rounded-xl overflow-hidden border border-gray-800"><div class="h-48 skeleton"></div><div class="p-5 space-y-3"><div class="h-3 w-1/3 skeleton rounded"></div><div class="h-5 w-full skeleton rounded"></div><div class="h-5 w-5/6 skeleton rounded"></div><div class="h-3 w-full mt-4 skeleton rounded"></div></div></div>`;
            } else { skeletonContainer.classList.add("hidden"); grid.classList.remove("hidden"); }
        }
        
        function toggleSidebar() { document.getElementById("sidebar").classList.toggle("-translate-x-full"); document.getElementById("overlay").classList.toggle("hidden"); }
        function escapeHtml(text) { if (!text) return ""; const div = document.createElement("div"); div.textContent = text; return div.innerHTML; }
        
        // Exposer les fonctions globalement pour les onclick
        window.selectAnswer = selectAnswer;
        window.nextQuestion = nextQuestion;
        window.resetQuizAndRestart = resetQuizAndRestart;
        window.showArticle = showArticle;
        window.backToList = backToList;
        window.refreshCurrentCategory = refreshCurrentCategory;
        window.toggleSidebar = toggleSidebar;
        window.filterArticles = filterArticles;
        
        document.addEventListener("DOMContentLoaded", init);
    </script>
</body>
</html>
